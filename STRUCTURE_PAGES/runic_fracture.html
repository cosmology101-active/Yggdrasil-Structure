<!doctype html>
<html lang='en'>
<head>
<meta charset='utf-8'>

<title>Yggdrasil — Runic Fracture</title>
<style>:root{--bg:#071019;--card:#111827;--text:#e6eef6;--muted:#9aa4af;--accent:#7ee787;--accent2:#4fb5ff;--border:rgba(255,255,255,0.08);--entry:#e6b3ff;--pct:#ffc299}body{margin:0;font-family:Inter,Segoe UI,system-ui,Arial,sans-serif;background:#05080f;color:var(--text)}.container{max-width:1180px;margin:0 auto;padding:20px}header,footer{padding:18px 0;text-align:center}header h1{margin:0;font-size:2.2rem;color:var(--accent)}header p,footer p{margin:10px 0;color:var(--muted)}.card{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:20px;box-shadow:0 18px 40px rgba(0,0,0,0.22)}.structure-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:16px}.structure-card{display:block;padding:18px;border-radius:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);text-decoration:none;color:inherit;transition:transform .15s ease,box-shadow .15s ease}.structure-card:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(0,0,0,0.28)}.structure-card strong{display:block;font-size:1.05rem;margin-bottom:6px}.structure-card span{color:var(--muted);font-size:0.95rem}.table{width:100%;border-collapse:collapse;margin:12px 0}.table tr{border-bottom:1px solid rgba(255,255,255,0.08)}.table td{padding:10px;text-align:left;vertical-align:top}.table td.entry{color:var(--entry);font-weight:500;width:70%}.table td.pct{color:var(--pct);text-align:right;width:30%;font-variant-numeric:tabular-nums}.code{font-family:Consolas,monospace;font-size:0.92rem;color:#b7c6f3;background:rgba(255,255,255,0.04);padding:4px 6px;border-radius:6px}.meta{color:var(--muted);font-size:0.95rem;line-height:1.6;margin-top:10px}.link{color:var(--accent2);text-decoration:none}.link:hover{text-decoration:underline}details summary{cursor:pointer;outline:none;user-select:none}details summary:hover{background:rgba(255,255,255,0.03);border-radius:6px;padding:8px}.details-card{margin-bottom:18px}.pool{margin-bottom:16px}ul{margin:0 0 0 18px;padding:0}li{margin-bottom:6px}.cat-badge{display:inline-block;padding:4px 8px;border-radius:6px;color:#000;font-size:0.9rem;font-weight:600}.rolls{color:var(--muted);font-size:0.9rem;font-style:italic;margin-left:auto}@media(max-width:860px){.container{padding:16px}.table td.entry{width:60%}.table td.pct{width:40%}}</style>
</head>
